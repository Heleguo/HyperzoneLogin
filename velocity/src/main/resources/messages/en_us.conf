# HyperZoneLogin Velocity messages - English

common {
  only-player = "<red>This command can only be used by players.</red>"
  no-permission = "<red>You do not have permission.</red>"
  player-state-unavailable = "<red>Unable to resolve the current login-session player.</red>"
}

chat {
  must-verify-before-chat = "<red>You must complete verification before chatting.</red>"
  only-allowed-commands = "<yellow>During authentication, only commands such as /login, /register, /changepassword, /email, /totp, and /upgrade are available.</yellow>"
  waiting-area-only = "<yellow>This command can only be used in the waiting-area server.</yellow>"
}

rename {
  usage = "<yellow>Usage: /rename <new-registration-name></yellow>"
  not-in-waiting-area = "<red>Only players still in the waiting area can change the current profile-registration name.</red>"
  already-bound = "<yellow>A formal profile is already attached. /rename only applies to waiting-area sessions that have not created a profile yet.</yellow>"
  same-as-current = "<yellow>The new registration name is the same as the current pending one.</yellow>"
  create-blocked = "<red>This name is still unavailable for profile creation: <reason></red><yellow>Please choose another non-conflicting name first, then continue.</yellow>"
  context-conflict = "<red>There are multiple pending profile-creation credential contexts, so /rename cannot be applied safely.</red>"
  success = "<green>The profile-registration name for this waiting-area session is now <white><name></white><green>. The pending flow is being retried with this name.</green>"
  remember-name = "<yellow>Please remember and use this name from now on: <white><name></white><yellow>.</yellow><gray>If you are still blocked afterwards because of a UUID conflict, run /reUUID next.</gray>"
  reuuid-required = "<yellow>Your new name has already been remembered, but profile creation is still blocked by a UUID conflict: <reason></yellow><gray>Run /reUUID next. The system will keep using the name you just changed to.</gray>"
  event-failed = "<red>Failed to trigger the rename flow: <reason></red>"
}

reuuid {
  usage = "<yellow>Usage: /reUUID</yellow>"
  not-in-waiting-area = "<red>Only players still in the waiting area can request a new profile-creation UUID.</red>"
  already-bound = "<yellow>A formal profile is already attached. /reUUID only applies to waiting-area sessions that have not created a profile yet.</yellow>"
  create-blocked = "<red>This problem cannot be solved by retrying UUID allocation alone: <reason></red><yellow>If the name is still not correct yet, use /rename <new-registration-name> first.</yellow>"
  context-conflict = "<red>There are multiple pending profile-creation credential contexts, so /reUUID cannot be applied safely.</red>"
  success = "<green>A new profile-creation UUID has been requested for this session. The pending flow will now retry using your current remembered registration name.</green><gray>If you just used /rename, that new name will be kept.</gray>"
  event-failed = "<red>Failed to trigger the reUUID flow: <reason></red>"
}

hzl {
  usage {
    reload = "<yellow>/hzl reload</yellow>"
    re = "<yellow>/hzl re</yellow>"
    uuid = "<yellow>/hzl uuid</yellow>"
  }

  reloaded = "<green>Reloaded!</green>"
  reauth-start = "<yellow>Re-authentication has started...</yellow>"
  auth-flow-unavailable = "<red>No available authentication waiting-area flow is enabled right now.</red>"

  uuid {
    proxy-player = "<yellow>[ProxyPlayer] name=<name> uuid=<uuid></yellow>"
    client-original = "<yellow>[ClientOriginal][UNTRUSTED] name=<name> uuid=<uuid></yellow>"
    hyper-player = "<yellow>[HyperZonePlayer] verified=<verified> attachedProfile=<attached_profile> waitingArea=<waiting_area> registrationName=<registration_name> canCreateProfile=<can_create_profile> credentials=<credentials></yellow>"
    profile = "<yellow>[Profile] id=<id> name=<name> uuid=<uuid></yellow>"
    profile-null = "<yellow>[Profile] null</yellow>"
  }
}

upgrade {
  usage = "<yellow>Usage: /upgrade</yellow>"
  not-authenticated = "<red>Upgrade failed: Please complete authentication via /login first.</red>"
  not-offline-account = "<red>Upgrade failed: Only offline accounts can perform this operation.</red>"
  not-online-connection = "<red>Upgrade failed: You must connect through an online authentication method (premium/Yggdrasil) to upgrade.</red>"
  success-mojang = "<green>Upgrade successful! Your account has been upgraded from offline to <bold>PREMIUM (Mojang/Microsoft)</bold> authentication.<newline>From now on, please use the premium method to log in. Offline login will no longer be available.</green>"
  success-yggdrasil = "<green>Upgrade successful! Your account has been upgraded from offline to <bold>SKIN-SERVER (Yggdrasil)</bold> authentication.<newline>From now on, please use the skin-server method to log in. Offline login will no longer be available.</green>"
  failed = "<red>Upgrade failed due to an internal error. Please try again later.</red>"
}

auth-mode {
  offline-disallowed = "<red>This account has been bound to a premium/skin-server authentication method. Please use the corresponding method to log in.</red>"
}

player {
  enter-waiting-area = "<yellow>You have entered the waiting area. Please finish authentication and wait for your profile to be prepared.</yellow>"
  leave-waiting-area = "<green>You have left the waiting area.</green>"
  enter-game-area = "<green>You have entered the game area. Have fun!</green>"
  leave-game-area = "<yellow>You have left the game area.</yellow>"
  verified-unbound = "<yellow>Authentication passed, but no profile is bound yet.</yellow><gray>If you have a registered offline account using this premium/skin-server connection, use /login <password> to authenticate and then run /upgrade to upgrade.</gray>"
  profile-conflict-self = "<red>Another session with the same profile is already playing or entering the game area. Your entry to the game area has been blocked.</red><yellow>If you are actually stuck on profile creation, first confirm whether the name is conflicting: use /rename <new-registration-name> first, and only use /reUUID if you are still blocked afterwards.</yellow>"
  profile-conflict-other = "<yellow>A duplicate login attempt with the same profile was detected. That session has been blocked from entering the game area.</yellow>"
}

backend-auth {
  no-auth-server = "<red>No available authentication waiting server is configured.</red>"
  enter-failed {
    exception = "<red>Failed to enter the authentication waiting server: <reason></red>"
    reason = "<red>Failed to enter the authentication waiting server: <reason></red>"
  }
  misconfigured-disconnect = "<red>The authentication waiting server is misconfigured. Please contact an administrator.</red>"
  unavailable-disconnect = "<red>The authentication waiting server is unavailable. Please contact an administrator.</red>"
  must-verify-before-transfer = "<yellow>Please finish authentication before entering other servers.</yellow>"
  auth-timeout-kick = "<red>Login timeout, please reconnect.</red>"

  exit {
    no-target = "<yellow>There is currently no return target server, so the authentication waiting area cannot be exited.</yellow>"
    server-missing = "<red>Failed to return to the target server after leaving the authentication waiting area: target server <white><server></white><red> does not exist.</red>"
    failure-exception = "<red>Failed to return to the target server after leaving the authentication waiting area: <reason></red>"
    failure-reason = "<red>Failed to return to the target server after leaving the authentication waiting area: <reason></red>"
  }

  verified {
    no-target = "<yellow>Authentication completed, but there is currently no target server to return to automatically.</yellow>"
    server-missing = "<red>Authentication completed, but the auto-return target server <white><server></white><red> does not exist.</red>"
    failure-exception = "<red>Authentication completed, but auto-connecting to the target server failed: <reason></red>"
    failure-reason = "<red>Authentication completed, but auto-connecting to the target server failed: <reason></red>"
  }
}

exit {
  still-in-waiting-area = "<red>You are still in the waiting area: authentication is not finished or the game profile is not bound yet.</red>"
  not-in-waiting-area = "<yellow>You are not currently in an exitable authentication waiting area.</yellow>"
  attempted = "<green>Attempted to exit the authentication waiting area.</green>"
}

over {
  usage = "<yellow>Usage: /over</yellow>"
  disabled = "<yellow>Slow-test mode is disabled, so /over is unavailable.</yellow>"
  not-in-waiting-area = "<red>Only players who are still in the waiting area can use /over.</red>"
  failed = "<red>/over failed. Please verify the current credential/profile state and try again.</red>"
  blocked-by-slow-test = "<yellow>Slow-test mode is enabled.</yellow><gray> Direct external overVerify calls are being ignored; enter </gray><white>/over</white><gray> in the core waiting area to complete final verification.</gray>"
}

