name: Weekly Release

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Compute weekly tag
        id: meta
        run: |
          TAG="weekly-$(date -u +%G).W$(date -u +%V)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=HyperZoneLogin $TAG" >> "$GITHUB_OUTPUT"

      - name: Build plugin jars
        run: ./gradlew clean build -PreleaseChannel=WEEKLY

      - name: Publish artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          path: build/HZL/*