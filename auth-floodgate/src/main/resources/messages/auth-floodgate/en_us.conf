auth-floodgate {
  init-player-failed = "<red>Floodgate login failed: failed to initialize the login-session player.</red>"
  temporary-profile-failed = "<red>Floodgate login failed: failed to initialize the temporary profile.</red>"
  registration-disabled = "<yellow>Floodgate trusted authentication has completed, but the administrator has disabled new player registration for this channel. If you already have a profile, use /bindcode use [binding-code].</yellow>"
  create-blocked = "<yellow>Floodgate trusted authentication has completed, but the current registration name cannot create a Profile. Use /rename [new-registration-name] or /bindcode use [binding-code].</yellow>"
